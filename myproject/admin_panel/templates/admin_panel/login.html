<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вхід в адмін-панель Pomero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 15% 20%, #dbeeff, #edf5ff 35%, #f6f8fb 80%);
            display: grid;
            place-items: center;
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        }

        .auth-card {
            width: 100%;
            max-width: 430px;
            border: 0;
            border-radius: 1rem;
            box-shadow: 0 16px 32px rgba(22, 33, 48, 0.12);
        }
    </style>
</head>
<body>
<div class="card auth-card p-4">
    <div class="text-center mb-4">
        <h1 class="h4 mb-1">Pomero Admin Panel</h1>
        <p class="text-muted mb-0">Вхід для модераторів та адміністраторів</p>
    </div>

    {% if form.non_field_errors %}
        <div class="alert alert-danger">
            {% for error in form.non_field_errors %}
                <div>{{ error }}</div>
            {% endfor %}
        </div>
    {% endif %}

    {% for message in messages %}
        <div class="alert {% if 'error' in message.tags %}alert-danger{% else %}alert-info{% endif %}">{{ message }}</div>
    {% endfor %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_username" class="form-label">Логін</label>
            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label for="id_password" class="form-label">Пароль</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Увійти</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
